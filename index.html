<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Sistema de Cadastro de Funcionários</h1>
    </header>

    <main>
        <section class="form-section">
            <h2>Novo Colaborador</h2>
            <form id="form-funcionario">
                <div class="input-group">
                    <input type="text" id="nome" placeholder="Nome completo" required>
                    <input type="email" id="email" placeholder="E-mail" required>
                </div>
                <div class="input-group">
                    <input type="text" id="cargo" placeholder="Cargo" required>
                    <input type="text" id="departamento" placeholder="Departamento" required>
                </div>
                <div class="input-group">
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>
                <button type="submit">Cadastrar Funcionário</button>
            </form>
        </section>

        <section class="dashboard-section">
            <div class="dashboard-header">
                <h2>Lista de Funcionários</h2>
                <span id="contador">Total: 0</span>
            </div>
            
            <div id="lista-funcionarios" class="cards-container">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
