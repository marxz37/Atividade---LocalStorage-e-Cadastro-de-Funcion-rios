<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Funcionários</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="login-container">
        <section class="form-section login-box">
            <h2>Acesso ao Sistema</h2>
            <form id="form-login">
                <div class="input-group">
                    <input type="text" id="login-usuario" placeholder="E-mail ou Login (Ex: admin)" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-senha" placeholder="Senha" required>
                </div>
                <button type="submit">Entrar</button>
                <p id="mensagem-erro" class="erro" style="display: none;">Usuário ou senha inválidos.</p>
            </form>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
