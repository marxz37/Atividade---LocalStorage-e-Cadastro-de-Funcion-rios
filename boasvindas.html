<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Colaborador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Portal do Colaborador</h1>
        <button id="btn-sair" class="btn-sair">Sair</button>
    </header>

    <main class="dashboard-section container-boasvindas">
        <h2 id="msg-boasvindas">Bem-vindo(a), </h2>
        
        <div class="card card-perfil">
            <h3>Seus Dados:</h3>
            <p><strong>E-mail:</strong> <span id="info-email"></span></p>
            <p><strong>Cargo:</strong> <span id="info-cargo"></span></p>
            <p><strong>Departamento:</strong> <span id="info-departamento"></span></p>
        </div>
    </main>

    <script src="boasvindas.js"></script>
</body>
</html>
